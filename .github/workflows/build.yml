name: Build timeline

on:
  schedule:
    - cron: "17 * * * *"        # runs hourly (at :17 past the hour)
  workflow_dispatch: {}          # lets you run it by hand from the Actions tab
  push:
    paths:                       # also rebuild when you edit the feed list/script
      - feeds.txt
      - build-timeline.py

permissions:
  contents: write                # allow the job to commit timeline.json back

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build timeline.json
        run: python3 build-timeline.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add timeline.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update timeline.json"
            git push
          fi
